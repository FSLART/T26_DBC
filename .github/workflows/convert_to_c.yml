name: Generate C code 

on:
  push:
    branches:
      - main

jobs:
  generate_and_export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install latest version of cantools
          pip install --upgrade cantools openpyxl

      - name: Generate C code and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Pull latest changes first so generation always uses the current DBC
          git pull --rebase

          mkdir -p generated
          find . -type f -name "*.dbc" -not -path "./other_dbcs/*" | while read -r dbcfile; do
            base=$(basename "$dbcfile" .dbc)
            outdir="generated/$base"
            mkdir -p "$outdir"
            echo "Generating C code for $dbcfile into $outdir"
            cantools generate_c_source "$dbcfile" --output "$outdir"
          done

          git add generated/
          if ! git diff --cached --quiet; then
            git commit -m "Auto-generated C code and Excel export from DBC files"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
